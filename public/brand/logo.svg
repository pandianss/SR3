  <rect width="140" height="140" rx="31" fill="#0B1929"/>
  <rect x="1.5" y="1.5" width="137" height="137" rx="29.5" fill="none" stroke="#244066" stroke-opacity="0.5" stroke-width="3"/>
  <path d="M95 44 A25 25 0 1 0 70 69 A25 25 0 1 1 45 94" fill="none" stroke="#E9A020" stroke-width="13" stroke-linecap="round"/>
  <polygon points="36,86 54,86 45,69" fill="#E9A020"/>
  <circle cx="95" cy="44" r="9" fill="#FDD060"/>
</svg>
